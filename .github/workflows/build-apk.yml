name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: ~/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Install Build Tools via SDK Manager
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin
        yes | sdkmanager "build-tools;29.0.3"

    - name: Build Debug APK
      run: ./gradlew assembleDebug --warning-mode none

    - name: Build Release APK
      run: ./gradlew assembleRelease --warning-mode none

    - name: Sign Release APK
      id: sign_release
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.APK_KEY_STORE }}
        alias: ${{ secrets.KEYSTORE_ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_STORE_PASSWORD }}

    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: hxftpserver-debug-${{ github.run_number }}
        path: app/build/outputs/apk/debug/hxftpserver-debug-*.apk

    - name: Upload Signed Release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: hxftpserver-release-signed-${{ github.run_number }}
        path: ${{ steps.sign_release.outputs.signedReleaseFile }}

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ci-build-${{ github.run_number }}
        files: |
          app/build/outputs/apk/debug/hxftpserver-debug-*.apk
          ${{ steps.sign_release.outputs.signedReleaseFile }}
        prerelease: true
        body: Auto build from commit ${{ github.sha }}