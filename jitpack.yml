# JitPack configuration file
# This file tells JitPack how to build the project

before_install:
  - sdk install java 17.0.7-tem
  - sdk use java 17.0.7-tem

install:
  - echo "JitPack build for HxFtpServer"
  - echo "No library artifacts to publish - this is an Android application"
  - echo "JitPack is used only for dependency resolution via build.gradle"
